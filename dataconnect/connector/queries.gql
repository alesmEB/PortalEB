# Starter queries. Expand this file as each screen is built; there's no
# need to pre-build a full CRUD surface before the UI that consumes it.

# Data Connect's SDK codegen only exports an enum's TypeScript type when
# it's selected from a root-level query - MediaType/PhotoStage/OrderEventType
# are otherwise only ever selected through a nested relation field (see
# GetWorkOrderDetail below), which isn't enough to keep the codegen emitting
# them. This query exists purely so those enums (used as real values
# throughout OrderDetailPage.tsx, media.ts, orderEvent.ts) stay exported -
# it's never actually called from the app.
query KeepMediaAndEventEnumsExported @auth(level: USER) {
  workOrderPhotos(limit: 1) {
    mediaType
    stage
  }
  orderTrackings(limit: 1) {
    eventType
  }
}

query GetCurrentUser @auth(level: USER) {
  user(id_expr: "auth.uid") {
    id
    email
    displayName
    role
    userPermissions: userPermissions_on_user {
      permission {
        key
      }
    }
  }
}

# Autocomplete source for the "reuse an existing customer" step of order
# creation.
query ListCustomers @auth(level: USER) {
  customers(orderBy: { name: ASC }) {
    id
    name
    contactName
    phone
    email
    linkedUserId
    boats: boats_on_owner(orderBy: { name: ASC }) {
      id
      name
      registrationNumber
    }
  }
}

# Autocomplete source for the "reuse an existing boat/machine" step of order
# creation; each boat comes with its already-registered engines.
query ListBoats @auth(level: USER) {
  boats(orderBy: { name: ASC }) {
    id
    name
    registrationNumber
    manufacturerModel
    beamMeters
    loaMeters
    ownerId
    owner {
      name
    }
    engines: engines_on_boat(orderBy: { createdAt: ASC }) {
      id
      engineType
      chassisNumber
      propellerSerialNumber
    }
  }
}

# Admin section: users, boats and customers management.
query ListUsers @auth(level: USER) {
  users(orderBy: { displayName: ASC }) {
    id
    email
    displayName
    role
    isActive
    userPermissions: userPermissions_on_user {
      permission {
        id
        key
      }
    }
  }
}

query ListPermissions @auth(level: USER) {
  permissions(orderBy: { key: ASC }) {
    id
    key
    description
  }
}

# Candidates for the "assign technicians" picker: technicians by role, plus
# any ADMIN (team lead) granted the "orders:assignable" permission. Filtered
# client-side since role-or-permission isn't expressible in a single `where`.
query ListAssignableUsers @auth(level: USER) {
  users(where: { isActive: { eq: true } }, orderBy: { displayName: ASC }) {
    id
    displayName
    role
    userPermissions: userPermissions_on_user {
      permission {
        key
      }
    }
  }
}

# Summary rows for the main orders list screen.
query ListWorkOrders @auth(level: USER) {
  workOrders(orderBy: { createdAt: DESC }) {
    id
    code
    status
    locationCode
    assetLocation
    createdAt
    customer {
      name
    }
    boat {
      name
    }
  }
}

# Same shape as ListWorkOrders, scoped to one customer - used by CLIENT-role
# users so the orders list only shows their own orders (see
# GetMyLinkedCustomer, which resolves the current user to a customerId).
query ListWorkOrdersForCustomer($customerId: UUID!) @auth(level: USER) {
  workOrders(where: { customerId: { eq: $customerId } }, orderBy: { createdAt: DESC }) {
    id
    code
    status
    locationCode
    assetLocation
    createdAt
    customer {
      name
    }
    boat {
      name
    }
  }
}

# Resolves the signed-in user to "their" customer record, if any (set via the
# Customer.linkedUserId field, wired up in the Clientes admin screen).
query GetMyLinkedCustomer @auth(level: USER) {
  customers(where: { linkedUserId: { eq_expr: "auth.uid" } }) {
    id
  }
}

# Enforces "one active shift at a time": lets the UI know whether the
# current technician is already clocked in somewhere (this order or another)
# before letting them start a new one.
query GetMyActiveTimeLog @auth(level: USER) {
  timeLogs(where: { technicianId: { eq_expr: "auth.uid" }, clockOut: { isNull: true } }) {
    id
    workOrderId
    clockIn
    workOrder {
      code
    }
  }
}

query ListMyAssignedWorkOrders @auth(level: USER) {
  technicianAssignments(
    where: { technicianId: { eq_expr: "auth.uid" }, unassignedAt: { isNull: true } }
  ) {
    isAllowed
    isLead
    workOrder {
      id
      code
      status
      boat {
        name
      }
    }
  }
}

# Retired in favor of ListAssignedWorkOrders + ListWorkOrderScheduledDates
# (multi-day scheduling replaced the single scheduledDate field this query
# depended on). Kept as @retired rather than deleted so the previous preview
# deploy's still-live client doesn't get connector errors mid-rollout.
query ListSchedulableWorkOrders @auth(level: USER) @retired {
  workOrders(where: { status: { in: [ASSIGNED, IN_PROGRESS] } }) {
    id
    code @retired
    status @retired
    locationCode @retired
    assetLocation @retired
    customer @retired {
      name
    }
    boat @retired {
      name
    }
    assignments: technicianAssignments_on_workOrder(where: { unassignedAt: { isNull: true } })
      @retired {
      technician {
        displayName
      }
    }
  }
}

# Powers the "Órdenes asignadas" panel of the weekly calendar page: every
# order with technicians assigned that isn't completed yet, along with every
# day it's already scheduled on (so the panel can show which of the current
# week's checkboxes are already ticked, across any week).
query ListAssignedWorkOrders @auth(level: USER) {
  workOrders(where: { status: { in: [ASSIGNED, IN_PROGRESS] } }, orderBy: { code: ASC }) {
    id
    code
    status
    locationCode
    assetLocation
    customer {
      name
    }
    boat {
      name
    }
    assignments: technicianAssignments_on_workOrder(where: { unassignedAt: { isNull: true } }) {
      technician {
        displayName
      }
    }
    scheduledDates: workOrderScheduledDates_on_workOrder(orderBy: { date: ASC }) {
      date
    }
    tasks: workOrderTasks_on_workOrder {
      isCompleted
    }
  }
}

# Powers the day columns of the weekly calendar page - every scheduled day
# for every order, regardless of the order's status, so a COMPLETED order's
# past scheduled days still show up (read-only) instead of disappearing.
query ListWorkOrderScheduledDates @auth(level: USER) {
  workOrderScheduledDates(orderBy: { date: ASC }) {
    date
    workOrder {
      id
      code
      status
      locationCode
      assetLocation
      customer {
        name
      }
      boat {
        name
      }
      assignments: technicianAssignments_on_workOrder(where: { unassignedAt: { isNull: true } }) {
        technician {
          displayName
        }
      }
      tasks: workOrderTasks_on_workOrder {
        isCompleted
      }
    }
  }
}

query GetWorkOrderDetail($id: UUID!) @auth(level: USER) {
  workOrder(id: $id) {
    id
    code
    locationCode
    sequenceNumber
    status
    assetLocation
    description
    quoteAttempts
    finalReportUrl
    customer {
      name
      contactName
      phone
    }
    boat {
      name
      registrationNumber
      engines: engines_on_boat {
        engineType
        chassisNumber
        propellerSerialNumber
      }
    }
    tasks: workOrderTasks_on_workOrder {
      id
      description
      isCompleted
    }
    quotes: quotes_on_workOrder(orderBy: { attemptNumber: ASC }) {
      id
      attemptNumber
      fileUrl
      amount
      decision
      rejectionReason
    }
    assignments: technicianAssignments_on_workOrder(where: { unassignedAt: { isNull: true } }) {
      technicianId
      isAllowed
      isLead
      technician {
        displayName
      }
    }
    timeLogs: timeLogs_on_workOrder(orderBy: { clockIn: DESC }) {
      id
      technicianId
      clockIn
      clockOut
      durationMinutes
      technician {
        displayName
      }
    }
    incidents: incidents_on_workOrder(orderBy: { createdAt: DESC }) {
      id
      description
      createdAt
      resolvedAt
      reportedBy {
        displayName
      }
    }
    tracking: orderTrackings_on_workOrder(orderBy: { occurredAt: DESC }) {
      eventType
      occurredAt
      actor {
        displayName
      }
      metadata
    }
    photos: workOrderPhotos_on_workOrder(orderBy: { createdAt: DESC }) {
      id
      stage
      storageUrl
      mediaType
      incidentId
      createdAt
      uploadedBy {
        displayName
      }
    }
  }
}

# "EB Engineering" intranet section (see schema.gql) - reads are plain
# @auth(level: USER) queries gated client-side (ADMIN role or admin:lab for
# the management screens, own-record-only for a linked client - see
# EbEngineeringPage.tsx/EbMyProductsPage.tsx), same broad-read model as
# ListUsers/ListPermissions above; writes all go through Cloud Functions
# (see ebCreate*/ebAdd*/ebUpdate*/ebDelete* in functions/index.js).
query ListEbClients @auth(level: USER) {
  ebClients(orderBy: { companyName: ASC }) {
    id
    email
    companyName
    contactName
    phone
    country
    linkedUserId
    linkedUser {
      displayName
    }
    distributorId
    distributor {
      companyName
    }
    createdAt
  }
}

query ListEbCableTypes @auth(level: USER) {
  ebCableTypes(orderBy: { code: ASC }) {
    id
    code
    name
  }
}

# Flat list of every unit ever sold, across every client - powers the admin
# "all products sold" screen (filtered client-side by date/country/etc,
# same pattern as OrdersListPage's filters).
query ListEbClientProducts @auth(level: USER) {
  ebClientProducts(orderBy: { purchasedAt: DESC }) {
    id
    productName
    serialNumber
    hardwareNumber
    programFileUrl
    purchasedAt
    observations
    soldToEndUserAt
    retiredAt
    createdAt
    client {
      id
      companyName
      country
    }
    cables: ebClientProductCables_on_product {
      cableType {
        id
        code
        name
      }
    }
  }
}

# Resolves the signed-in user to "their" EB Engineering client record, if
# any (set via EbClient.linkedUserId, wired up in the admin Clientes
# screen) - same pattern as GetMyLinkedCustomer above.
query GetMyEbClient @auth(level: USER) {
  ebClients(where: { linkedUserId: { eq_expr: "auth.uid" } }) {
    id
    companyName
  }
}

query ListMyEbClientProducts($clientId: UUID!) @auth(level: USER) {
  ebClientProducts(where: { clientId: { eq: $clientId } }, orderBy: { purchasedAt: DESC }) {
    id
    productName
    serialNumber
    hardwareNumber
    programFileUrl
    purchasedAt
    cables: ebClientProductCables_on_product {
      cableType {
        id
        code
        name
      }
    }
  }
}

query ListEbNewsPosts @auth(level: USER) {
  ebNewsPosts(orderBy: { createdAt: DESC }) {
    id
    title
    body
    createdAt
    author {
      displayName
    }
  }
}

query ListEbFaqItems @auth(level: USER) {
  ebFaqItems(orderBy: { createdAt: ASC }) {
    id
    question
    answer
  }
}

# Interventions list ("Orden de intervención" intake, see intervention.pdf) -
# lab-only screen for now, same access model as createIntervention.
query ListInterventions @auth(level: USER) {
  interventions(orderBy: { createdAt: DESC }) {
    id
    code
    locationCode
    createdAt
    expectedDeliveryAt
    homePort
    pier
    berthPosition
    engineComponentInfo
    keysLeft
    wantsQuoteFirst
    requestedWork
    observations
    signatureUrl
    customer {
      name
      contactName
      phone
    }
    boat {
      name
      registrationNumber
      manufacturerModel
      loaMeters
      beamMeters
    }
    receivedBy {
      displayName
    }
  }
}
