# Starter queries. Expand this file as each screen is built; there's no
# need to pre-build a full CRUD surface before the UI that consumes it.

query GetCurrentUser @auth(level: USER) {
  user(id_expr: "auth.uid") {
    id
    email
    displayName
    role
    userPermissions: userPermissions_on_user {
      permission {
        key
      }
    }
  }
}

# Autocomplete source for the "reuse an existing customer" step of order
# creation.
query ListCustomers @auth(level: USER) {
  customers(orderBy: { name: ASC }) {
    id
    name
    contactName
    phone
  }
}

# Autocomplete source for the "reuse an existing boat/machine" step of order
# creation; each boat comes with its already-registered engines.
query ListBoats @auth(level: USER) {
  boats(orderBy: { name: ASC }) {
    id
    name
    registrationNumber
    ownerId
    engines: engines_on_boat(orderBy: { createdAt: ASC }) {
      id
      engineType
      chassisNumber
      propellerSerialNumber
    }
  }
}

query GetOrderSequence($locationCode: OrderLocation!) @auth(level: USER) {
  orderSequences(where: { locationCode: { eq: $locationCode } }) {
    lastNumber
  }
}

query ListWorkOrdersForCustomer($customerId: UUID!) @auth(level: USER) {
  workOrders(where: { customerId: { eq: $customerId } }, orderBy: { createdAt: DESC }) {
    id
    code
    status
    boat {
      name
      registrationNumber
    }
    createdAt
  }
}

query ListMyAssignedWorkOrders @auth(level: USER) {
  technicianAssignments(
    where: { technicianId: { eq_expr: "auth.uid" }, unassignedAt: { isNull: true } }
  ) {
    workOrder {
      id
      code
      status
      boat {
        name
      }
    }
  }
}

query GetWorkOrderDetail($id: UUID!) @auth(level: USER) {
  workOrder(id: $id) {
    id
    code
    locationCode
    sequenceNumber
    status
    assetLocation
    description
    quoteAttempts
    finalReportUrl
    customer {
      name
      contactName
      phone
    }
    boat {
      name
      registrationNumber
      engines: engines_on_boat {
        engineType
        chassisNumber
        propellerSerialNumber
      }
    }
    tasks: workOrderTasks_on_workOrder {
      id
      description
      isCompleted
    }
    quotes: quotes_on_workOrder(orderBy: { attemptNumber: ASC }) {
      attemptNumber
      fileUrl
      amount
      decision
      rejectionReason
    }
    tracking: orderTrackings_on_workOrder(orderBy: { occurredAt: DESC }) {
      eventType
      occurredAt
      actor {
        displayName
      }
      metadata
    }
  }
}
