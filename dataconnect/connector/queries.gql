# Starter queries. Expand this file as each screen is built; there's no
# need to pre-build a full CRUD surface before the UI that consumes it.

query GetCurrentUser @auth(level: USER) {
  user(id_expr: "auth.uid") {
    id
    email
    displayName
    role
    userPermissions: userPermissions_on_user {
      permission {
        key
      }
    }
  }
}

query ListWorkOrdersForCustomer($customerId: UUID!) @auth(level: USER) {
  workOrders(where: { customerId: { eq: $customerId } }, orderBy: { createdAt: DESC }) {
    id
    code
    status
    boat {
      name
      engineModel
    }
    createdAt
  }
}

query ListMyAssignedWorkOrders @auth(level: USER) {
  technicianAssignments(
    where: { technicianId: { eq_expr: "auth.uid" }, unassignedAt: { isNull: true } }
  ) {
    workOrder {
      id
      code
      status
      boat {
        name
      }
    }
  }
}

query GetWorkOrderDetail($id: UUID!) @auth(level: USER) {
  workOrder(id: $id) {
    id
    code
    status
    description
    quoteAttempts
    finalReportUrl
    customer {
      fullName
      email
      phone
    }
    boat {
      name
      engineManufacturer
      engineModel
      engineHours
    }
    tasks: workOrderTasks_on_workOrder {
      id
      description
      isCompleted
    }
    quotes: quotes_on_workOrder(orderBy: { attemptNumber: ASC }) {
      attemptNumber
      fileUrl
      amount
      decision
      rejectionReason
    }
    tracking: orderTrackings_on_workOrder(orderBy: { occurredAt: DESC }) {
      eventType
      occurredAt
      actor {
        displayName
      }
      metadata
    }
  }
}
