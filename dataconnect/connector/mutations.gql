# All mutations moved to Cloud Functions (see functions/index.js) - the named
# operations that used to live here (admin CRUD, then the order-lifecycle
# ones below: UpsertOrderSequence, CreateWorkOrder, SetWorkOrderReportUrl,
# UpdateWorkOrderStatus, CreateQuote, DecideQuote, AssignTechnician,
# UnassignTechnician, StartWorkOrder, CompleteWorkOrder, CreateIncident,
# CreateWorkOrderTask, CreateWorkOrderPhoto, LogOrderEvent, ClockIn,
# ClockOut) only ever enforced @auth(level: USER) - any signed-in account,
# not just the right role/permission, could call them directly against the
# Data Connect endpoint and bypass every business rule the corresponding
# Cloud Function enforces (e.g. flip a WorkOrder straight to COMPLETED,
# self-assign as isLead on any order, or log a fabricated ClockOut duration).
# Removed once the client no longer called any of them directly - see git
# history if one of these shapes is ever needed again.
