# PortalEB relational schema (Firebase Data Connect / PostgreSQL)
#
# Firestore is used only for the per-order chat (see firestore.rules).
# Every other entity - users, permissions, customers, boats/machines and
# their engines, work orders, quotes, technician assignments, time logs,
# incidents, photos and the audit trail - lives here so PostgreSQL can
# enforce referential integrity via real foreign keys.
#
# Conventions:
# - Every table has a `UUID! @default(expr: "uuidV4()")` surrogate key,
#   except `User` (Firebase Auth uid, `String!`) and join/relation tables
#   with an explicit composite `key: [...]` (e.g. `UserPermission`,
#   `TechnicianAssignment`, `WorkOrderScheduledDate`).
# - Every foreign key is declared as its own scalar field (e.g.
#   `workOrderId: UUID!`) right next to the `@ref` relation field that
#   points at it, so the foreign keys are explicit and readable instead of
#   hidden behind hidden the auto-generated columns.
# - Timestamps default to `request.time` (server time at mutation) so
#   clients can't backdate audit-relevant fields.

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum UserRole {
  ADMIN
  CLIENT
  TECHNICIAN
}

enum OrderLocation {
  ALGECIRAS # code "A"
  LA_LINEA # code "V"
  SOTOGRANDE # code "S"
}

enum WorkOrderStatus {
  PENDING_QUOTE # awaiting the 1st/2nd budget upload from the admin
  QUOTE_REJECTED # client rejected the latest quote; admin may upload a 2nd
  AWAITING_ASSIGNMENT # quote accepted, waiting for technicians to be assigned
  ASSIGNED # technicians assigned, work not started yet
  IN_PROGRESS # at least one technician has clocked in
  COMPLETED # final photos uploaded and report generated
  CANCELLED # both quote attempts were rejected; order is archived
}

enum QuoteDecision {
  PENDING
  ACCEPTED
  REJECTED
}

enum PhotoStage {
  START
  INCIDENT
  FINAL
}

enum MediaType {
  PHOTO
  VIDEO
}

enum OrderEventType {
  ORDER_CREATED
  QUOTE_UPLOADED
  QUOTE_ACCEPTED
  QUOTE_REJECTED
  ORDER_CANCELLED
  TECHNICIANS_ASSIGNED
  TECHNICIAN_UNASSIGNED
  WORK_STARTED
  WORK_STOPPED
  INCIDENT_REPORTED
  INCIDENT_RESOLVED
  PHOTO_UPLOADED
  ORDER_COMPLETED
  REPORT_GENERATED
  TIME_LOG_EDITED
  TIME_LOG_DELETED
}

# ---------------------------------------------------------------------------
# Identity & access (RBAC + granular permissions)
# ---------------------------------------------------------------------------

type User @table(name: "users") {
  # No @default(expr: "auth.uid") - every insert (client self-signup never
  # existed; accounts are always admin-created) already passes the target
  # user's uid explicitly. Keeping that default made Data Connect try to
  # resolve auth.uid on every insert regardless of the explicit override,
  # which fails hard ("Failed to compute String_Expr") under the Admin SDK's
  # unauthenticated request context - see adminCreateUser in functions/index.js.
  id: String!
  email: String! @unique
  displayName: String!
  phone: String
  role: UserRole!
  isActive: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp @default(expr: "request.time")
}

# Catalog of permission strings, e.g. "orders:create", "quotes:upload",
# "quotes:approve", "hours:log", "chat:write", "photos:upload".
type Permission @table(name: "permissions") {
  id: UUID! @default(expr: "uuidV4()")
  key: String! @unique
  description: String!
}

# Many-to-many User <-> Permission, kept as an explicit join table (instead
# of a flat array column) so PostgreSQL enforces that both sides exist.
type UserPermission @table(name: "user_permissions", key: ["user", "permission"]) {
  userId: String!
  user: User! @ref(fields: ["userId"])
  permissionId: UUID!
  permission: Permission! @ref(fields: ["permissionId"])
  grantedById: String
  grantedBy: User @ref(fields: ["grantedById"])
  grantedAt: Timestamp! @default(expr: "request.time")
}

# ---------------------------------------------------------------------------
# Customers & boats/machinery
# ---------------------------------------------------------------------------

type Customer @table(name: "customers") {
  id: UUID! @default(expr: "uuidV4()")
  name: String! # nombre de empresa o particular
  contactName: String! # nombre del responsable
  phone: String! # telefono del responsable
  email: String
  taxId: String
  address: String
  # Set only if this customer also has a portal login (role CLIENT).
  linkedUserId: String
  linkedUser: User @ref(fields: ["linkedUserId"])
  createdAt: Timestamp! @default(expr: "request.time")
}

# A boat or piece of industrial machinery. Stored independently of any one
# WorkOrder so both the asset and its engines can be reused across orders.
type Boat @table(name: "boats") {
  id: UUID! @default(expr: "uuidV4()")
  ownerId: UUID!
  owner: Customer! @ref(fields: ["ownerId"])
  name: String!
  registrationNumber: String
  hullMaterial: String
  loaMeters: Float
  # "Astillero - Fabricante - Modelo" and "Manga" on the intervention intake
  # sheet (see Intervention below) - free text/beam width, not collected by
  # the older work-order creation flow but reused here since it's the same
  # underlying Boat row.
  manufacturerModel: String
  beamMeters: Float
  createdAt: Timestamp! @default(expr: "request.time")
}

# A boat/machine can have several engines; each is captured separately so
# more can be added later without touching the Boat row.
type Engine @table(name: "engines") {
  id: UUID! @default(expr: "uuidV4()")
  boatId: UUID!
  boat: Boat! @ref(fields: ["boatId"])
  engineType: String! # tipo de motor
  chassisNumber: String! # numero de chasis del motor
  propellerSerialNumber: String! # numero de serie del propulsor
  createdAt: Timestamp! @default(expr: "request.time")
}

# ---------------------------------------------------------------------------
# Work orders, tasks, quotes & technician assignment
# ---------------------------------------------------------------------------

type WorkOrder @table(name: "work_orders") {
  id: UUID! @default(expr: "uuidV4()")
  code: String! @unique # e.g. "A-000001", formatted from locationCode + sequenceNumber
  locationCode: OrderLocation!
  sequenceNumber: Int!
  customerId: UUID!
  customer: Customer! @ref(fields: ["customerId"])
  boatId: UUID!
  boat: Boat! @ref(fields: ["boatId"])
  createdById: String!
  createdBy: User! @ref(fields: ["createdById"])
  status: WorkOrderStatus! @default(value: PENDING_QUOTE)
  assetLocation: String! # donde esta ubicada la embarcacion/maquina
  description: String # comentarios adicionales
  # Enforced at the application layer: never exceeds 2 (see Quote below).
  quoteAttempts: Int! @default(value: 0)
  finalReportUrl: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp @default(expr: "request.time")
  completedAt: Timestamp
  cancelledAt: Timestamp
}

# The list of jobs to perform, captured at order creation.
type WorkOrderTask @table(name: "work_order_tasks") {
  id: UUID! @default(expr: "uuidV4()")
  workOrderId: UUID!
  workOrder: WorkOrder! @ref(fields: ["workOrderId"])
  description: String!
  isCompleted: Boolean! @default(value: false)
  createdAt: Timestamp! @default(expr: "request.time")
}

# Days the admin has scheduled this order's work for, shown on the weekly
# calendar - a work order can span several (possibly non-consecutive) days,
# so this is one row per day rather than a single field on WorkOrder. Only
# meaningful once technicians are assigned (ASSIGNED/IN_PROGRESS); freely
# addable/removable until COMPLETED, enforced in the
# setWorkOrderScheduledDate Cloud Function rather than here.
type WorkOrderScheduledDate
  @table(name: "work_order_scheduled_dates", key: ["workOrder", "date"]) {
  workOrderId: UUID!
  workOrder: WorkOrder! @ref(fields: ["workOrderId"])
  date: Date!
  createdAt: Timestamp! @default(expr: "request.time")
}

# Up to 2 rows per WorkOrder (attemptNumber 1 and 2); a 2nd rejection
# cancels/archives the order. Enforced in the connector's mutation logic,
# not as a DB constraint, since Data Connect has no CHECK directive.
type Quote @table(name: "quotes") {
  id: UUID! @default(expr: "uuidV4()")
  workOrderId: UUID!
  workOrder: WorkOrder! @ref(fields: ["workOrderId"])
  attemptNumber: Int!
  fileUrl: String!
  amount: Float
  uploadedById: String!
  uploadedBy: User! @ref(fields: ["uploadedById"])
  decision: QuoteDecision! @default(value: PENDING)
  rejectionReason: String
  decidedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
}

# Many-to-many User(technician) <-> WorkOrder.
type TechnicianAssignment
  @table(name: "technician_assignments", key: ["workOrder", "technician"]) {
  workOrderId: UUID!
  workOrder: WorkOrder! @ref(fields: ["workOrderId"])
  technicianId: String!
  technician: User! @ref(fields: ["technicianId"])
  assignedById: String!
  assignedBy: User! @ref(fields: ["assignedById"])
  assignedAt: Timestamp! @default(expr: "request.time")
  unassignedAt: Timestamp
  # Can start/finish the order, not just work on it and log incidents (the
  # default for a plain technician assignment).
  isAllowed: Boolean! @default(value: false)
  # "Jefe de la orden": same practical powers as isAllowed, kept as a
  # separate flag purely for administrative traceability.
  isLead: Boolean! @default(value: false)
}

# ---------------------------------------------------------------------------
# Execution: time tracking, incidents & photos
# ---------------------------------------------------------------------------

type TimeLog @table(name: "time_logs") {
  id: UUID! @default(expr: "uuidV4()")
  workOrderId: UUID!
  workOrder: WorkOrder! @ref(fields: ["workOrderId"])
  technicianId: String!
  technician: User! @ref(fields: ["technicianId"])
  clockIn: Timestamp! @default(expr: "request.time")
  clockOut: Timestamp
  durationMinutes: Int
  notes: String
}

type Incident @table(name: "incidents") {
  id: UUID! @default(expr: "uuidV4()")
  workOrderId: UUID!
  workOrder: WorkOrder! @ref(fields: ["workOrderId"])
  reportedById: String!
  reportedBy: User! @ref(fields: ["reportedById"])
  description: String!
  createdAt: Timestamp! @default(expr: "request.time")
  resolvedAt: Timestamp
}

type WorkOrderPhoto @table(name: "work_order_photos") {
  id: UUID! @default(expr: "uuidV4()")
  workOrderId: UUID!
  workOrder: WorkOrder! @ref(fields: ["workOrderId"])
  stage: PhotoStage!
  # Only set when stage == INCIDENT.
  incidentId: UUID
  incident: Incident @ref(fields: ["incidentId"])
  storageUrl: String!
  mediaType: MediaType! @default(value: PHOTO)
  uploadedById: String!
  uploadedBy: User! @ref(fields: ["uploadedById"])
  createdAt: Timestamp! @default(expr: "request.time")
}

# ---------------------------------------------------------------------------
# Audit trail (critical requirement: who / what / when for every event)
# ---------------------------------------------------------------------------

type OrderTracking @table(name: "order_tracking") {
  id: UUID! @default(expr: "uuidV4()")
  workOrderId: UUID!
  workOrder: WorkOrder! @ref(fields: ["workOrderId"])
  actorId: String!
  actor: User! @ref(fields: ["actorId"]) # who performed the action
  eventType: OrderEventType! # what happened
  # Free-form JSON with event-specific detail (previous/new status,
  # rejection reason, assigned technician ids, etc).
  metadata: Any
  occurredAt: Timestamp! @default(expr: "request.time") # exact server time
}

# ---------------------------------------------------------------------------
# "EB Engineering" intranet - unrelated to the repair-order workflow above.
# A directory of clients who buy EB Engineering's own products (distinct
# from the repair-service Customer type), the products themselves, company
# news and an FAQ. Admin/products management is gated behind ADMIN role or
# admin:lab for now (see EbEngineeringPage.tsx) while it's still being
# shaped; a linked EbClient's own portal user gets a read-only view of just
# their own purchases (see GetMyEbClient/ListMyEbClientProducts).
# ---------------------------------------------------------------------------

type EbClient @table(name: "eb_clients") {
  id: UUID! @default(expr: "uuidV4()")
  email: String!
  companyName: String!
  contactName: String!
  phone: String!
  country: String!
  # Some clients are distributors who resell to their own end clients rather
  # than buying for themselves - when EB Engineering is notified of one of
  # those resales, the sold unit's EbClientProduct.clientId is repointed at
  # the end client (created here if new), and that end client's distributorId
  # records which distributor's zone they came through. Nullable/self-ref
  # since most clients buy directly and aren't under any distributor.
  distributorId: UUID
  distributor: EbClient @ref(fields: ["distributorId"])
  # Set only if this client also has a portal login (role CLIENT) to see
  # their own purchases - same pattern as Customer.linkedUserId.
  linkedUserId: String
  linkedUser: User @ref(fields: ["linkedUserId"])
  createdById: String!
  createdBy: User! @ref(fields: ["createdById"])
  createdAt: Timestamp! @default(expr: "request.time")
}

# A cable that can be included with an EbClientProduct purchase - its own
# small catalog (rather than a fixed enum) so admins can add new cable
# types later without a schema change. `code` is the human-facing
# identifier (e.g. "EBEN-180100"), not the surrogate `id`.
type EbCableType @table(name: "eb_cable_types") {
  id: UUID! @default(expr: "uuidV4()")
  code: String! @unique
  name: String!
  createdAt: Timestamp! @default(expr: "request.time")
}

# One purchased EBcontroller unit. `productName` defaults to "EBcontroller"
# (the only product sold today) as a plain string rather than its own
# catalog table/type - deliberately not over-built for a second product
# that doesn't exist yet; easy to promote to a real catalog once it does.
# `programFileUrl` is the unit's custom program download - not treated as
# part of what defines the product, just an attachment on its purchase
# record, uploaded/replaced independently of the rest of this data.
type EbClientProduct @table(name: "eb_client_products") {
  id: UUID! @default(expr: "uuidV4()")
  clientId: UUID!
  client: EbClient! @ref(fields: ["clientId"])
  productName: String! @default(value: "EBcontroller")
  serialNumber: String!
  hardwareNumber: String!
  programFileUrl: String
  purchasedAt: Date
  observations: String
  # Set via the "Vender a cliente final" action (see EbProductsTab.tsx) when
  # a distributor resells this unit - the date is chosen there (defaults to
  # today), not necessarily when the transfer is recorded in the app.
  soldToEndUserAt: Date
  # Set when a unit is decommissioned (e.g. broken) - null means active. Kept
  # in the database and still visible in the list rather than deleted, since
  # the sale/serial history matters even for a dead unit. See
  # ebSetClientProductRetired in functions/index.js.
  retiredAt: Timestamp
  createdById: String!
  createdBy: User! @ref(fields: ["createdById"])
  createdAt: Timestamp! @default(expr: "request.time")
}

# Many-to-many EbClientProduct <-> EbCableType - a purchase can include
# several cables (e.g. both "Cable single" and "EBups").
type EbClientProductCable
  @table(name: "eb_client_product_cables", key: ["product", "cableType"]) {
  productId: UUID!
  product: EbClientProduct! @ref(fields: ["productId"])
  cableTypeId: UUID!
  cableType: EbCableType! @ref(fields: ["cableTypeId"])
}

type EbNewsPost @table(name: "eb_news_posts") {
  id: UUID! @default(expr: "uuidV4()")
  title: String!
  body: String!
  authorId: String!
  author: User! @ref(fields: ["authorId"])
  createdAt: Timestamp! @default(expr: "request.time")
}

type EbFaqItem @table(name: "eb_faq_items") {
  id: UUID! @default(expr: "uuidV4()")
  question: String!
  answer: String!
  createdById: String!
  createdBy: User! @ref(fields: ["createdById"])
  createdAt: Timestamp! @default(expr: "request.time")
}

# ---------------------------------------------------------------------------
# Repair intake ("Orden de Reparación" counter form)
# ---------------------------------------------------------------------------

# Digitizes the front-desk intake sheet filled in when a customer drops off
# a boat/machine - deliberately its own entity, not a WorkOrder: at this
# stage nothing has been quoted or assigned yet, the customer is just
# stating what they want done and signing the intake consent. Its own code
# sequence (not WorkOrder's - see reserveInterventionSequenceNumber in
# functions/index.js), since it isn't a per-location numbering like work
# order codes are on the physical sheet.
type Intervention @table(name: "interventions") {
  id: UUID! @default(expr: "uuidV4()")
  code: String! @unique # e.g. "INT-000001"
  sequenceNumber: Int!
  locationCode: OrderLocation!
  customerId: UUID!
  customer: Customer! @ref(fields: ["customerId"])
  boatId: UUID!
  boat: Boat! @ref(fields: ["boatId"])
  receivedById: String! # "Recepcionista"
  receivedBy: User! @ref(fields: ["receivedById"])
  expectedDeliveryAt: Date
  # "Puerto Base - Localización" / "Pantalán - Ubicación" / "Atraque -
  # Posición" / "Motor - Componente - Hélice" boxes on the sheet - specific
  # to this visit, not a permanent Boat attribute.
  homePort: String
  pier: String
  berthPosition: String
  engineComponentInfo: String
  keysLeft: Boolean!
  # true = "Presupuesto" box checked; false = "Reparación (Renuncia al
  # presupuesto)" - the two are mutually exclusive on the sheet.
  wantsQuoteFirst: Boolean!
  requestedWork: String!
  observations: String
  # PNG of the customer's signature, rendered server-side from the canvas
  # data URL the client submits - see createIntervention in functions/index.js.
  signatureUrl: String!
  consentSignedAt: Timestamp!
  createdAt: Timestamp! @default(expr: "request.time")
}

# ---------------------------------------------------------------------------
# Cable tester (ESP32 device)
# ---------------------------------------------------------------------------

# One row per cable continuity check performed by the shop's ESP32-based
# tester - written directly from the device via a couple of plain HTTP Cloud
# Functions (esp32GetLastCableCheck/esp32RegisterCableCheck in
# functions/index.js), not through the app's normal authenticated client
# flow, since the device can't do interactive sign-in. sequenceNumber is a
# human-friendly autoincrementing counter (same
# Firestore-transaction-backed reservation pattern as WorkOrder/Intervention
# - see reserveCableCheckSequenceNumber), separate from the UUID id.
type CableCheck @table(name: "cable_checks") {
  id: UUID! @default(expr: "uuidV4()")
  sequenceNumber: Int! @unique
  cableTypeId: UUID!
  cableType: EbCableType! @ref(fields: ["cableTypeId"])
  checkedById: String!
  checkedBy: User! @ref(fields: ["checkedById"])
  checkedAt: Timestamp! @default(expr: "request.time")
}
